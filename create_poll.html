<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Créer sondage</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="pollBody">

<h2>Créer un sondage</h2>

<input id="pollQuestion" placeholder="Question du sondage">

<br><br>

<div id="answersContainer">

    <input class="answerInput" placeholder="Réponse 1">

    <br><br>

    <input class="answerInput" placeholder="Réponse 2">

</div>

<br>

<button onclick="addAnswer()">
    + Ajouter une réponse
</button>

<br><br>

<label>
<input type="checkbox" id="multipleChoice">
Réponses multiples
</label>

<br><br>

<label>
Couleur du sondage
<input type="color" id="pollColor">
</label>

<br><br>

<button onclick="publishPoll()">
    Publier
</button>

<script type="module" src="script.js"></script>

</body>
</html>
